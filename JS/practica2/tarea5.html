<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>imagen Expandible</title>
</head>

<body>

    <h2>Pasa el ratón por encima</h2>

    <img src="https://goo.su/jBJCois" class="foto" onmouseover="agrandar(this)" onmouseout="normal(this)">

    <img src="https://goo.su/Nopbno" class="foto" onmouseover="agrandar(this)" onmouseout="normal(this)">

    <script>
        function agrandar(elemento) { 
            elemento.style.transform = "scale(1.3)";   
            elemento.style.border = "5px solid black";
        }

        function normal(elemento) {
            elemento.style.transform = "scale(1)";
            elemento.style.border = "none";
        }
    </script>

</body>

</html>
